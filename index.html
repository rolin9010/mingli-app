<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- 中文：ExtraLight 200 / SemiBold 600 / Bold 700 -->
    <!-- 非小程序环境才加载 Google Fonts（微信 WebView 无法访问） -->
    <script>
      if (!/miniprogram=1/.test(location.search)) {
        var l1 = document.createElement('link'); l1.rel='preconnect'; l1.href='https://fonts.googleapis.com'; document.head.appendChild(l1);
        var l2 = document.createElement('link'); l2.rel='preconnect'; l2.href='https://fonts.gstatic.com'; l2.crossOrigin=''; document.head.appendChild(l2);
        var l3 = document.createElement('link'); l3.id='mingli-font-noto-serif-sc'; l3.rel='stylesheet'; l3.href='https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;600;700&display=swap'; document.head.appendChild(l3);
      }
    </script>
    <title>mingli-app</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
